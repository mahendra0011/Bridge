# Render.com deployment config
# Docs: https://render.com/docs/yaml-spec
#
# Usage:
#   1. Push this repo to GitHub
#   2. On Render: New > Blueprint > connect your repo
#   3. Set the secret env vars in Render dashboard (JWT_SECRET, BREVO_API_KEY, etc.)

services:
  - type: web
    name: bridge-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set this in Render dashboard (Atlas connection string)
      - key: JWT_SECRET
        sync: false          # Set in Render dashboard — keep secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BREVO_API_KEY
        sync: false          # Set in Render dashboard
      - key: EMAIL_FROM
        sync: false          # e.g. Bridge <no-reply@yourdomain.com>
      - key: CLIENT_URL
        sync: false          # Your Vercel frontend URL e.g. https://bridge.vercel.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Admin














































