# Local dev with Docker. Run: docker compose up
# This spins up MongoDB + the backend together.
# Frontend still runs with: cd frontend && npm run dev
version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: bridge_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bridge_backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/bridge
    ports:
      - '5000:5000'
    volumes:
      # Persist uploads across container restarts
      - uploads_data:/app/uploads

volumes:
  mongo_data:
  uploads_data:














































