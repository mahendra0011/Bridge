<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bridge — Internships & Jobs for Students</title>
    <meta name="description" content="Connecting the next generation of talent with the world's most ambitious companies." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f46e5'/%3E%3Cpath d='M8 22V10l8 6-8 6zm10-12v12h3V10h-3z' fill='white'/%3E%3C/svg%3E">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Bridge",
      "url": "https://bridge-platform.com",
      "description": "Connecting the next generation of talent with the world's most ambitious companies — internships and jobs for students.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://bridge-platform.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Bridge",
      "description": "Internship and job platform connecting students with companies.",
      "url": "https://bridge-platform.com",
      "logo": "https://bridge-platform.com/logo.png"
    }
    </script>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('bridge_theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch(e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
